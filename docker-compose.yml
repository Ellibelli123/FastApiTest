services:
  db:
    image: pgvector/pgvector:pg16
    container_name: lefitnesstest-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 5324
      POSTGRES_DB: le_fitness_test
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: